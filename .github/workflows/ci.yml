name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  quality:
    name: Quality Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive

      - name: Configure SSH for cargo git dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: quality-ubuntu
          cache-all-crates: "true"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets and all features
        run: cargo check --all-targets --all-features

      - name: Run clippy with warnings denied
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Enforce warning budget
        shell: bash
        run: scripts/check_warning_budget.sh

      - name: Enforce oversized-file ratchet
        shell: bash
        run: python3 scripts/check_code_size_budget.py

      - name: Enforce oversized-test ratchet
        shell: bash
        run: python3 scripts/check_test_size_budget.py

      - name: Enforce panic-prone usage ratchet
        shell: bash
        run: scripts/check_panic_budget.py

      - name: Enforce swallowed-error usage ratchet
        shell: bash
        run: scripts/check_swallowed_error_budget.py

  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive

      - name: Configure SSH for cargo git dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
        id: sccache

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mold

      - name: Install nextest
        run: cargo install cargo-nextest --locked

      - name: Build
        shell: bash
        run: |
          mkdir -p .cargo
          if [ "$RUNNER_OS" = "Linux" ]; then
            cat > .cargo/config.toml << 'EOF'
          [target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = ["-C", "link-arg=-fuse-ld=mold"]
          EOF
          fi
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Run tests with nextest
        shell: bash
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo nextest run --target ${{ matrix.target }} --lib --bins

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  windows-build-test:
    name: Build & Test (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive

      - name: Configure SSH for cargo git dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-latest
          cache-all-crates: "true"

      - name: Build release binary
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --start-server *> $null
            if ($LASTEXITCODE -eq 0) {
              $env:RUSTC_WRAPPER = 'sccache'
            }
          }
          & cargo build --locked --release --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) {
            throw 'Windows release build failed'
          }

      - name: Install cargo-nextest
        shell: pwsh
        run: cargo install cargo-nextest --locked

      - name: Run Windows library and binary tests (nextest)
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --start-server *> $null
            if ($LASTEXITCODE -eq 0) {
              $env:RUSTC_WRAPPER = 'sccache'
            }
          }
          & cargo nextest run --locked --target x86_64-pc-windows-msvc --lib --bins

      - name: Verify built binary launches
        shell: pwsh
        run: |
          & "target/x86_64-pc-windows-msvc/release/jcode.exe" --version
          if ($LASTEXITCODE -ne 0) {
            throw 'Built Windows binary failed to run --version'
          }
