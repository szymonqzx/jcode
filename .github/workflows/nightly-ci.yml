name: Nightly CI

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  nightly-build-test:
    name: Nightly Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure SSH for cargo git dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
        continue-on-error: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.os }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mold

      - name: Build release binary
        shell: bash
        run: |
          mkdir -p .cargo
          if [ "$RUNNER_OS" = "Linux" ]; then
            cat > .cargo/config.toml << 'EOF'
          [target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = ["-C", "link-arg=-fuse-ld=mold"]
          EOF
          fi
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Run full test suite
        shell: bash
        run: |
          python3 .github/scripts/run_with_timeout.py 1200 \
            cargo test --target ${{ matrix.target }} --all

      - name: Verify binary launches
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./target/${{ matrix.target }}/release/jcode.exe --version
          else
            ./target/${{ matrix.target }}/release/jcode --version
          fi

  nightly-security-scan:
    name: Nightly Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Check for outdated dependencies
        run: |
          cargo install cargo-outdated --locked
          cargo outdated

  nightly-dependency-check:
    name: Nightly Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Check for unused dependencies
        run: |
          cargo install cargo-udeps --locked
          cargo +nightly udeps --all-targets
        continue-on-error: true

      - name: Check for duplicate dependencies
        run: |
          cargo install cargo-duplicate --locked
          cargo duplicate
