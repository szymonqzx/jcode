name: Nightly CI

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  nightly-build-test:
    name: Nightly Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure SSH for cargo git dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
        continue-on-error: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.os }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mold

      - name: Install nextest
        run: cargo install cargo-nextest --locked

      - name: Build
        shell: bash
        run: |
          mkdir -p .cargo
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo '[target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = ["-C", "link-arg=-fuse-ld=mold"]' > .cargo/config.toml
          fi
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Run tests with nextest
        shell: bash
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo nextest run --target ${{ matrix.target }} --lib --bins
