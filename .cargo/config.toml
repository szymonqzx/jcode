[build]
jobs = 8

[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native"]

[target.aarch64]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold", "-C", "target-cpu=cortex-a72"]

[profile.dev]
opt-level = 1           # Faster incremental builds, still debuggable
codegen-units = 8      # Parallel codegen for speed
debug = "line-tables-only"  # Minimal debug info
incremental = true
overflow-checks = false

[profile.release]
opt-level = 3
codegen-units = 1
lto = "thin"
strip = true

[profile.dev.package."*"]
opt-level = 0  # Default for most crates

[profile.dev.package."ratatui"]
opt-level = 2  # Small hot-path win

[profile.dev.package."crossterm"]
opt-level = 2
